# Alembic configuration file
# The sqlalchemy.url is overridden at runtime by app/main.py from the
# DATABASE_URL environment variable, so the value here is only a fallback
# for running alembic CLI commands locally outside Docker.

[alembic]
# Path to the migrations directory (relative to this file)
script_location = app/db/migrations

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for the %%(year)d etc. placeholders
timezone = UTC

# truncate_slug_length limits the slug part of the filename
truncate_slug_length = 40

# Set to 'true' to run the environment script in async mode
# (we use our own async approach in env.py, so leave this as false)
# async_mode = false

# Fallback URL used only when running alembic CLI directly.
# In Docker, main.py injects the real DATABASE_URL.
sqlalchemy.url = postgresql+psycopg2://shopping:changeme@localhost:5432/shoppingcompanion

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
