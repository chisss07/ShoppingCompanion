server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver.
    # valid=30s re-resolves every 30s so nginx handles containers
    # that restart or start after nginx does.
    # ipv6=off avoids resolution failures on hosts without IPv6.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # ── API proxy → FastAPI backend ──────────────────────────
    # Using a variable defers DNS resolution to request time,
    # so nginx starts successfully even if backend isn't up yet.
    location /api/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_unavailable;
    }

    # ── WebSocket proxy → websocket service ─────────────────
    location /ws/ {
        set $websocket http://websocket:8001;
        proxy_pass $websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_unavailable;
    }

    # ── JSON error when backend/websocket is unreachable ────
    location @api_unavailable {
        default_type application/json;
        return 503 '{"detail":"Service temporarily unavailable. Backend may still be starting up."}';
    }

    # ── Static assets (long cache) ───────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA routing — all unmatched paths serve index.html ───
    location / {
        try_files $uri /index.html;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
