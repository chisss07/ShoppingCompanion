# ============================================================
# Shopping Companion — Unraid Docker Compose Stack
# ============================================================
# Usage:
#   1. Install "Docker Compose Manager" plugin from Community Apps
#   2. In Compose Manager, create a new stack named "shopping-companion"
#   3. Paste this file content into the compose editor
#   4. Create /mnt/user/appdata/shopping-companion/.env with your keys
#      (copy from .env.example and fill in values)
#   5. Click "Compose Up"
#
# Web UI will be available at http://<unraid-ip>:8090
# ============================================================

services:

  # ── All-in-one app (nginx + backend + websocket + worker) ─
  app:
    image: chisss/shoppingcompanion:latest
    container_name: shopping-companion
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8090}:80"
    environment:
      APP_ENV: ${APP_ENV:-production}
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-shopping}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-shoppingcompanion}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BESTBUY_API_KEY: ${BESTBUY_API_KEY:-}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      EBAY_APP_ID: ${EBAY_APP_ID:-}
      EBAY_CERT_ID: ${EBAY_CERT_ID:-}
      EBAY_OAUTH_TOKEN: ${EBAY_OAUTH_TOKEN:-}
      AMAZON_ACCESS_KEY: ${AMAZON_ACCESS_KEY:-}
      AMAZON_SECRET_KEY: ${AMAZON_SECRET_KEY:-}
      AMAZON_PARTNER_TAG: ${AMAZON_PARTNER_TAG:-}
      WALMART_CONSUMER_ID: ${WALMART_CONSUMER_ID:-}
      WALMART_PRIVATE_KEY: ${WALMART_PRIVATE_KEY:-}
      SEARCH_RATE_LIMIT_PER_MINUTE: ${SEARCH_RATE_LIMIT_PER_MINUTE:-10}
      SEARCH_RATE_LIMIT_PER_DAY: ${SEARCH_RATE_LIMIT_PER_DAY:-200}
      ALLOWED_ORIGINS: "http://localhost:${FRONTEND_PORT:-8090},http://${UNRAID_IP:-0.0.0.0}:${FRONTEND_PORT:-8090}"
    networks:
      - shopping-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 20s
      timeout: 10s
      start_period: 90s
      retries: 5
    labels:
      - "net.unraid.docker.managed=composeman"
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/chisss07/ShoppingCompanion/main/docs/icon.png"
      - "net.unraid.docker.webui=http://[IP]:[PORT:8090]/"

  # ── PostgreSQL 16 ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shopping-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shopping}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-shoppingcompanion}
    volumes:
      - ${APPDATA_PATH:-/mnt/user/appdata/shopping-companion}/postgres:/var/lib/postgresql/data
    networks:
      - shopping-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shopping} -d ${POSTGRES_DB:-shoppingcompanion}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shopping-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ${APPDATA_PATH:-/mnt/user/appdata/shopping-companion}/redis:/data
    networks:
      - shopping-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  shopping-net:
    driver: bridge
