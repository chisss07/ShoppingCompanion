# ============================================================
# Shopping Companion — Unraid Docker Compose Stack
# ============================================================
# Usage:
#   1. Install "Docker Compose Manager" plugin from Community Apps
#   2. In Compose Manager, create a new stack named "shopping-companion"
#   3. Paste this file content into the compose editor
#   4. Create /mnt/user/appdata/shopping-companion/.env with your keys
#      (copy from .env.example and fill in values)
#   5. Click "Compose Up"
#
# Web UI will be available at http://<unraid-ip>:8090
# ============================================================

services:

  # ── All-in-one app (nginx + backend + websocket + worker) ─
  app:
    image: chisss/shoppingcompanion:latest
    container_name: shopping-companion
    restart: unless-stopped
    ports:
      - "8090:80"
    env_file:
      - /mnt/user/appdata/shopping-companion/.env
    environment:
      # These override or supplement the .env file for container-internal values
      # that differ from what's in .env (e.g. service hostnames inside Docker network)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      APP_ENV: production
      DEBUG: "false"
    networks:
      - shopping-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 20s
      timeout: 10s
      start_period: 90s
      retries: 5
    labels:
      - "net.unraid.docker.managed=composeman"
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/chisss07/ShoppingCompanion/main/docs/icon.png"
      - "net.unraid.docker.webui=http://[IP]:[PORT:8090]/"

  # ── PostgreSQL 16 ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shopping-postgres
    restart: unless-stopped
    env_file:
      - /mnt/user/appdata/shopping-companion/.env
    volumes:
      - /mnt/user/appdata/shopping-companion/postgres:/var/lib/postgresql/data
    networks:
      - shopping-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopping -d shoppingcompanion"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shopping-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - /mnt/user/appdata/shopping-companion/redis:/data
    networks:
      - shopping-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  shopping-net:
    driver: bridge
